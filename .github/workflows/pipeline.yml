name: scatup content pipeline

on:
  schedule:
    - cron: '0 0 * * *'        # 매일 00:00 UTC (= 09:00 KST). 급상승 감지 + 3일마다 정기 초안
  workflow_dispatch:            # 수동 실행 버튼
    inputs:
      force:
        description: '정기 주기(3일)를 무시하고 강제로 초안 생성'
        type: boolean
        default: false

permissions:
  contents: read                # checkout
  issues: write                 # Issue 생성/조회

concurrency:
  group: scatup-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run.py
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          LAW_API_KEY:         ${{ secrets.LAW_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          FORCE_RUN:           ${{ inputs.force }}
